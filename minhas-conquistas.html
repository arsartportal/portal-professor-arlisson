<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Minhas Conquistas</title>

  <!-- Responsividade -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS global -->
  <link rel="stylesheet" href="/css/style.css" />
  <!-- CSS conquistas -->
  <link rel="stylesheet" href="/css/minhas-conquistas.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>🏅 Minhas Conquistas</h1>
    <p>Desbloqueie conquistas e evolua no portal 🚀</p>
  </header>

  <!-- CONTEÚDO -->
  <main class="conquistas-container">

    <!-- PROGRESSO -->
    <section class="progresso-conquistas">
      <span id="contador-conquistas">0/0 conquistas</span>

      <div class="barra">
        <div id="barra-progresso"></div>
      </div>
    </section>

    <!-- GRID -->
    <section id="lista-badges" class="badges-grid"></section>

  </main>

  <!-- JS -->
  <script type="module" src="/js/minhas-conquistas.js"></script>

</body>
</html>
