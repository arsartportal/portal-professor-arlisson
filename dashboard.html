<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard do Professor</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

  <!-- ============================= -->
  <!-- BARRA SUPERIOR -->
  <!-- ============================= -->
  <div class="barra-superior">
    <button class="btn-voltar" onclick="voltar()">⬅ Voltar</button>
    <button id="exportar-csv" class="btn-exportar">📥 Exportar CSV</button>
  </div>

  <!-- ============================= -->
  <!-- TOPO -->
  <!-- ============================= -->
  <header class="topo">
    <h1>📊 Dashboard do Professor</h1>
  </header>

  <!-- ============================= -->
  <!-- CARDS RESUMO -->
  <!-- ============================= -->
  <section class="cards-resumo">

    <div class="card">
      👥 <span id="total-alunos">0</span>
      <small>Total de Alunos</small>
    </div>

    <div class="card">
      🔥 <span id="ativos">0</span>
      <small>Ativos (até 3 dias)</small>
    </div>

    <div class="card">
      ⚠️ <span id="regulares">0</span>
      <small>Regulares (até 10 dias)</small>
    </div>

    <div class="card">
      🏆 <span id="maior-xp-nome">---</span>
      <small><span id="maior-xp-valor">0</span> XP</small>
    </div>

    <div class="card">
      📈 <span id="media-xp">0</span>
      <small>Média de XP</small>
    </div>

  </section>

  <!-- ============================= -->
  <!-- FILTROS -->
  <!-- ============================= -->
  <section class="filtros">

    <select id="filtro-escola">
      <option value="todas">Todas as escolas</option>
    </select>

    <select id="filtro-serie">
      <option value="todas">Todas as séries</option>
    </select>

    <select id="filtro-turma">
      <option value="todas">Todas as turmas</option>
    </select>

  </section>

  <!-- ============================= -->
  <!-- TABELA GERAL -->
  <!-- ============================= -->
  <section class="tabela-container">
    <table class="tabela-dashboard">
      <thead>
        <tr>
          <th>#</th>
          <th>Aluno</th>
          <th>Escola</th>
          <th>Série</th>
          <th>Turma</th>
          <th>XP</th>
          <th class="coluna-patente">🎖️ Patente</th>
          <th>Status</th>
          <th>Último acesso</th>
          <th class="coluna-acoes">Ações</th>
        </tr>
      </thead>
      <tbody id="lista-alunos"></tbody>
    </table>
  </section>

  <!-- ============================= -->
  <!-- RANKING POR ESCOLA -->
  <!-- ============================= -->
  <section class="ranking-escolas">
    <h2>🏫 Ranking por Escola</h2>
    <div id="ranking-escolas-container"></div>
  </section>

  <!-- SCRIPT -->
  <script type="module" src="../js/dashboard.js"></script>

</body>
</html>
