<html lang="pt-BR">

<title>Aula – Tabela Periódica</title>

<style>

/* =====================================================
   ESTILO BASE (SEU PADRÃO)
===================================================== */
body{
font-family:'Segoe UI',Arial,sans-serif;
background:#eef2f8;
margin:0;
padding:40px;
color:#2c3e50;
}

.container{
max-width:1150px;
margin:auto;
background:#ffffff;
padding:40px;
border-radius:12px;
box-shadow:0 10px 35px rgba(0,0,0,0.12);
}

h1{text-align:center;font-size:34px;}
.sub{text-align:center;color:#6b7c93;}

h2{
margin-top:40px;
border-bottom:2px solid #e4e9f2;
padding-bottom:6px;
}

.card{
background:#f7f9fc;
padding:20px;
border-radius:8px;
margin-top:15px;
line-height:1.8;
}

/* =====================================================
   PROGRESSO
===================================================== */
.painel-progresso{
background:#f7f9fc;
border:1px solid #dbe4f0;
border-radius:10px;
padding:18px;
margin-bottom:25px;
}

.barra{
width:100%;
height:14px;
background:#dde6f2;
border-radius:999px;
overflow:hidden;
margin-top:14px;
}

.barra-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#2c7be5,#27ae60);
}

/* =====================================================
   TABELA PERIÓDICA
===================================================== */
#tabela{
display:grid;
grid-template-columns:repeat(18, 1fr);
gap:6px;
margin-top:20px;
}

.elemento{
border-radius:8px;
padding:6px;
font-size:11px;
text-align:center;
cursor:pointer;
border:1px solid #dbe4f0;
background:#fff;
transition:0.2s;
}

.elemento:hover{
transform:scale(1.05);
}

.numero{font-size:9px;color:#888;}
.simbolo{font-size:16px;font-weight:bold;}
.nome{font-size:9px;}

.alcalinos{background:#ffe5e5;}
.alcalino{background:#fff4cc;}
.ametais{background:#e5ffe5;}
.nobres{background:#e5f0ff;}
.transicao{background:#efe5ff;}

.info-box{
margin-top:20px;
padding:20px;
border-radius:10px;
background:#fff;
border:1px solid #dbe4f0;
}

button{
padding:10px 16px;
margin:5px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.questao{
background:#fafcff;
padding:18px;
margin-top:20px;
border-left:4px solid #2c7be5;
border-radius:6px;
}

.resultado{
margin-top:10px;
font-weight:bold;
}

.destaque{
margin-top:15px;
padding:14px 16px;

background:linear-gradient(135deg,#fff7e6,#ffe8cc);
border-left:5px solid #f39c12;

border-radius:8px;

font-weight:600;
font-size:15px;
line-height:1.6;

color:#7a4b00;

box-shadow:0 4px 10px rgba(243,156,18,0.15);

animation:aparecerDestaque 0.4s ease;
}

@keyframes aparecerDestaque{
from{
opacity:0;
transform:translateY(6px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* =====================================================
   LANTANÍDEOS E ACTINÍDEOS
===================================================== */
.linha-extra{
display:grid;
grid-template-columns:repeat(15, 1fr);
gap:6px;
margin-top:10px;
justify-content:center;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

.placeholder-f{
background:#f0f3f8;
border:2px dashed #9fb3c8;
color:#5c6f82;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

font-size:11px;
font-weight:bold;

border-radius:8px;
cursor:default;
}

/* TOOLTIP BLOCO F */
.placeholder-f{
position:relative;
background:#f0f3f8;
border:2px dashed #9fb3c8;
color:#5c6f82;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

font-size:11px;
font-weight:bold;

border-radius:8px;
cursor:help;
}

/* TEXTO OCULTO */
.placeholder-f::after{
content: attr(data-info);

position:absolute;
bottom:110%;
left:50%;
transform:translateX(-50%);

background:#2c3e50;
color:#fff;

padding:8px 10px;
border-radius:6px;

font-size:11px;
width:180px;

opacity:0;
pointer-events:none;
transition:0.25s;
}

/* SETINHA */
.placeholder-f::before{
content:"";

position:absolute;
bottom:100%;
left:50%;
transform:translateX(-50%);

border:6px solid transparent;
border-top-color:#2c3e50;

opacity:0;
transition:0.25s;
}

/* HOVER */
.placeholder-f:hover::after,
.placeholder-f:hover::before{
opacity:1;
}

</style>
</head>

function montarTabela(lista){
const tabela = document.getElementById("tabela");
tabela.innerHTML = "";

lista.forEach(el=>{
const div = document.createElement("div");

div.className = "elemento "+el.fam;
div.style.gridColumn = el.x;
div.style.gridRow = el.y;

if(el.n === 57){
div.className = "elemento placeholder-f";

div.setAttribute("data-info",
"Bloco f: Lantanídeos (57–71). Elementos internos, exibidos abaixo para manter a tabela compacta."
);

div.innerHTML = `
<div>57–71</div>
<div>Lantanídeos</div>
`;
}

else if(el.n === 89){
div.className = "elemento placeholder-f";

div.setAttribute("data-info",
"Bloco f: Actinídeos (89–103). Elementos radioativos, também exibidos fora da tabela principal."
);

div.innerHTML = `
<div>89–103</div>
<div>Actinídeos</div>
`;
}

else{
div.innerHTML = `
<div class="numero">${el.n}</div>
<div class="simbolo">${el.s}</div>
<div class="nome">${el.nome}</div>
`;

div.onclick = ()=>mostrar(el);
}

div.onclick = ()=>mostrar(el);

tabela.appendChild(div);
});
}

function mostrar(el){

const extra = dadosExtras[el.s] || {};

document.getElementById("infoElemento").innerHTML = `

<h2>${el.nome} (${el.s})</h2>

<b>Número atômico:</b> ${el.n}<br>

<b>Tipo:</b> ${extra.tipo || "-"}<br>

<hr>

<b>Massa atômica:</b> ${extra.massa || "-"}<br>

function filtrar(tipo){
if(tipo==="todos") montarTabela(elementos);
else montarTabela(elementos.filter(e=>e.fam===tipo));
}

const questoes = [
{p:"Famílias são:",a:["Linhas","Colunas","Blocos","Camadas"],c:1},
{p:"Períodos são:",a:["Linhas","Colunas","Grupos","Átomos"],c:0},
{p:"Sódio é:",a:["Ametal","Alcalino","Gás","Base"],c:1},
{p:"Oxigênio é:",a:["Metal","Ametal","Base","Sal"],c:1},
{p:"Gases nobres:",a:["Reativos","Pouco reativos","Metais","Ácidos"],c:1},
{p:"Carbono é:",a:["Metal","Ametal","Base","Sal"],c:1},
{p:"Tabela usa:",a:["Massa","Número atômico","Cor","Nome"],c:1},
{p:"Hélio é:",a:["Metal","Ametal","Gás nobre","Sal"],c:2},
{p:"Família indica:",a:["Cor","Propriedade","Nome","Tamanho"],c:1},
{p:"Lítio é:",a:["Ametal","Alcalino","Gás","Base"],c:1}
];

let respondidas = 0;

function carregarQuestoes(){
const div = document.getElementById("exercicios");
let html="";

questoes.forEach((q,i)=>{
html+=`<div class="questao"><p>${i+1}) ${q.p}</p>`;

q.a.forEach((alt,j)=>{
html+=`<div><input type="radio" name="q${i}" value="${j}"> ${alt}</div>`;
});

html+=`<button onclick="corrigir(${i})">Responder</button>`;
html+=`<div id="r${i}" class="resultado"></div></div>`;
});

div.innerHTML=html;
}

function corrigir(i){
const radios = document.getElementsByName("q"+i);
let escolha;

radios.forEach(r=>{
if(r.checked) escolha=parseInt(r.value);
});

if(escolha===undefined) return;

if(escolha===questoes[i].c){
document.getElementById("r"+i).innerHTML="✅ Correto";
}else{
document.getElementById("r"+i).innerHTML="❌ Errado";
}

respondidas++;
atualizar();
}

function atualizar(){
let p = (respondidas/questoes.length)*100;
document.getElementById("barra").style.width = p+"%";
document.getElementById("info").innerText = `${respondidas}/10`;
}

// =============================
// LINHAS EXTRAS (PADRÃO IGUAL)
// =============================

const lantanideos = elementos.filter(e => e.n >= 57 && e.n <= 71);
const actinideos = elementos.filter(e => e.n >= 89 && e.n <= 103);

function renderLinha(lista, containerId){
const container = document.getElementById(containerId);
container.innerHTML = "";

lista.forEach(el=>{

const div = document.createElement("div");

div.className = "elemento " + el.fam;

div.innerHTML = `
<div class="numero">${el.n}</div>
<div class="simbolo">${el.s}</div>
<div class="nome">${el.nome}</div>
`;

div.onclick = ()=>mostrar(el);

container.appendChild(div);

});
}

// 🔥 CHAMADAS
renderLinha(lantanideos,"linhaLantanideos");
renderLinha(actinideos,"linhaActinideos");


// =============================
// INICIALIZAÇÃO
// =============================
montarTabela(elementos);
carregarQuestoes();
