<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>🛒 Loja de Recompensas</title>

  <link rel="stylesheet" href="./css/loja.css">
  <link rel="stylesheet" href="./js/plugins/global-alert/globalAlert.css">
</head>

<body id="topo">
   

  <a href="home.html" class="btn-voltar">⬅ Voltar ao início</a>

<h1>🛒 Loja de Recompensas</h1>

<div class="sp-box">
  🧪 Seus SciencePoints: <span id="sp">...</span>
</div>

<nav class="menu-loja">
  <a href="#topo" data-target="topo">🏠 Início</a>
  <a href="#secao-comum" data-target="secao-comum">⚪ Comum</a>
  <a href="#secao-raro" data-target="secao-raro">🔵 Raro</a>
  <a href="#secao-epico" data-target="secao-epico">🟣 Épico</a>
  <a href="#secao-lendario" data-target="secao-lendario">🟡 Lendário</a>
  <a href="#historico" data-target="historico">📜 Histórico</a>
</nav>

<div class="atalhos-loja">
  <a href="inventario.html" class="btn-inventario-loja">🎒 Ver meu inventário</a>
</div>

  <!-- LISTAGEM DA LOJA -->
  <div id="loja"></div>

  <!-- MODAIS -->
  <div id="modal"></div>
  <div id="roletaModal"></div>

  <!-- HISTÓRICO -->
  <div class="historico-loja" id="historico">
    <h2>📜 Histórico de Compras</h2>
    <div id="feedCompras"></div>
  </div>

  <!-- POPUP DE RECOMPENSA -->
  <div id="popupRecompensa" class="popup-overlay">
    <div class="popup-card">
      <div id="popupAnimacao" class="popup-animacao"></div>
      <h2 id="popupTitulo"></h2>
      <p id="popupDescricao"></p>

      <button onclick="fecharPopup()" class="popup-btn">
        Continuar
      </button>
    </div>
  </div>

  <script type="module">
    /* ======================================================
       IMPORTS
    ====================================================== */
    import { auth, db } from "./js/firebase.js";
    import { obterPatentePorNivel } from "./js/patentes.js";
    import {
      initGlobalAlert as iniciarAlertaGlobal,
      globalAlert as mostrarAlertaGlobal
    } from "./js/plugins/global-alert/globalAlert.js";

    import {
      logCompraXP,
      logCompraRanking,
      logAberturaCaixa,
      logRoleta,
      logPremioFisico,
      adicionarAoInventario,
      salvarBeneficioInventario
    } from "./js/inventario-log.js";

    import {
      doc,
      getDoc,
      updateDoc,
      collection,
      addDoc,
      serverTimestamp,
      query,
      orderBy,
      limit,
      onSnapshot,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

    /* ======================================================
       CONFIGURAÇÃO DA LOJA
    ====================================================== */
    const recompensas = [
      { id: "xp20", nome: "⚡ +20 XP", preco: 10, xp: 20, descricao: "Pequeno bônus.", raridade: "comum" },
      { id: "xp50", nome: "⚡ +50 XP", preco: 20, xp: 50, descricao: "Bônus médio.", raridade: "raro" },
      { id: "xp100", nome: "⚡ +100 XP", preco: 40, xp: 100, descricao: "Grande bônus.", raridade: "epico" },

      { id: "caixa-basica", nome: "🧪 Caixa Básica", preco: 40, descricao: "Recompensas simples.", raridade: "comum" },
      { id: "caixa-cientifica", nome: "⚛ Caixa Científica", preco: 60, descricao: "Recompensas melhores.", raridade: "raro" },
      { id: "caixa-lendaria", nome: "👑 Caixa Lendária", preco: 120, descricao: "Altas recompensas.", raridade: "lendario" },

      { id: "roleta-cientifica", nome: "🎡 Roleta Científica", preco: 200, descricao: "Gire a roleta científica.", raridade: "epico" },

      { id: "ranking-7dias", nome: "🏆 Ranking 7 Dias", preco: 300, descricao: "Libera o acesso ao ranking por 7 dias.", raridade: "raro", tipo: "ranking", dias: 7 },
      { id: "ranking-15dias", nome: "🥈 Ranking 15 Dias", preco: 500, descricao: "Libera o acesso ao ranking por 15 dias.", raridade: "epico", tipo: "ranking", dias: 15 },
      { id: "ranking-30dias", nome: "👑 Ranking 30 Dias", preco: 900, descricao: "Libera o acesso ao ranking por 30 dias.", raridade: "lendario", tipo: "ranking", dias: 30 },

      { id: "chaveiro-univers3d", nome: "🔑 Chaveiro 3D", preco: 1500, lendario: true, descricao: "Prêmio físico.", raridade: "lendario" }
    ];

    /* ======================================================
       ESTADO GLOBAL
    ====================================================== */
    let spAluno = 0;
    let userRef = null;
    let estoqueChaveiro = 0;
    let girando = false;
    let unsubscribeHistorico = null;

    /* ======================================================
       UTILITÁRIOS
    ====================================================== */
    function atualizarSPNaTela() {
      const el = document.getElementById("sp");
      if (el) el.innerText = spAluno;
    }

    function mostrarErro(msg) {
      console.error(msg);
      alert(msg);
    }

    /* ======================================================
       CARREGAR ESTOQUE DO CHAVEIRO
    ====================================================== */
    async function carregarEstoque() {
      try {
        const ref = doc(db, "loja", "chaveiro-univers3d");
        const snap = await getDoc(ref);

        if (snap.exists()) {
          estoqueChaveiro = snap.data().estoque || 0;
        } else {
          estoqueChaveiro = 0;
        }
      } catch (erro) {
        console.error("Erro ao carregar estoque:", erro);
        estoqueChaveiro = 0;
      }
    }

    /* ======================================================
       CARREGAR SCIENCE POINTS DO USUÁRIO
    ====================================================== */
    async function carregarSP() {
      try {
        const user = auth.currentUser;
        if (!user) return;

        userRef = doc(db, "usuarios", user.uid);

        const snap = await getDoc(userRef);
        if (!snap.exists()) return;

        spAluno = snap.data().sciencePoints || 0;
        atualizarSPNaTela();

         await carregarEstoque();
         renderLoja();
         iniciarMenuAtivo();
         
      } catch (erro) {
        console.error("Erro ao carregar SciencePoints:", erro);
      }
    }

    /* ======================================================
       REGISTRAR COMPRA NO HISTÓRICO GLOBAL
    ====================================================== */
    async function registrarCompra(item) {
      try {
        const user = auth.currentUser;
        if (!user || !userRef) return;

        const snap = await getDoc(userRef);
        if (!snap.exists()) return;

        const dados = snap.data();

        await addDoc(collection(db, "lojaHistorico"), {
          uid: user.uid,
          aluno: dados.nome || user.email,
          escola: dados.escola || "-",
          serie: dados.serie || "-",
          turma: dados.turma || "-",
          item,
          data: serverTimestamp()
        });
      } catch (erro) {
        console.error("Erro ao registrar compra:", erro);
      }
    }

    /* ======================================================
       HISTÓRICO GLOBAL DA LOJA
    ====================================================== */
    async function carregarHistorico() {
      try {
        if (unsubscribeHistorico) {
          unsubscribeHistorico();
        }

        const q = query(
          collection(db, "lojaHistorico"),
          orderBy("data", "desc"),
          limit(20)
        );

        const feed = document.getElementById("feedCompras");
        if (!feed) return;

        unsubscribeHistorico = onSnapshot(q, async (snapshot) => {
          feed.innerHTML = "";

          snapshot.docChanges().forEach(change => {
            if (change.type !== "added") return;

            const c = change.doc.data();
            if (!c.data || !c.item) return;

            if (c.item.includes("Caixa Lendária")) {
              mostrarAlertaGlobal(`🔥 ${c.aluno} abriu uma CAIXA LENDÁRIA!`);
            }

            if (c.item.includes("Chaveiro")) {
              mostrarAlertaGlobal(`👑 ${c.aluno} ganhou um Chaveiro Univers3D!`);
            }

            if (c.item.includes("+800 XP")) {
              mostrarAlertaGlobal(`⚡ ${c.aluno} ganhou +800 XP na roleta!`);
            }
          });

          const docsOrdenados = snapshot.docs
            .filter(d => d.data().data)
            .sort((a, b) => b.data().data.toMillis() - a.data().data.toMillis());

          for (const documento of docsOrdenados) {
            const c = documento.data();
            if (!c.data) continue;

            const data = c.data.toDate();
            const dia = data.toLocaleDateString("pt-BR");
            const hora = data.toLocaleTimeString("pt-BR");
            const dataFormatada = `${dia} • ${hora}`;

            let patenteImg = "./assets/ranks/SeasonalRank0-0.png";

            if (c.uid) {
              try {
                const userDoc = await getDoc(doc(db, "usuarios", c.uid));

                if (userDoc.exists()) {
                  const dadosUser = userDoc.data();
                  const nivel = dadosUser.nivel || 0;
                  patenteImg = obterPatentePorNivel(nivel).imagem;
                }
              } catch (erro) {
                console.warn("Erro ao carregar patente do usuário:", erro);
              }
            }

            let classe = "feed-item";
            if (c.item.includes("Roleta")) classe += " feed-roleta";
            if (c.item.includes("Caixa")) classe += " feed-caixa";
            if (c.item.includes("Chaveiro")) classe += " feed-lendario";
            if (patenteImg.includes("Top")) classe += " patente-top";

            feed.innerHTML += `
              <div class="${classe}">
                <div class="feed-avatar">
                  <img src="${patenteImg}" alt="Patente">
                </div>

                <div class="feed-msg">
                  <b>${c.aluno}</b> ${c.item}

                  <div class="feed-info">
                    🏫 ${c.escola} • ${c.serie} ${c.turma}
                    <br>
                    🕒 ${dataFormatada}
                  </div>
                </div>
              </div>
            `;
          }

          feed.scrollTop = 0;
        });
      } catch (erro) {
        console.error("Erro ao carregar histórico:", erro);
      }
    }

    /* ======================================================
       RENDER DA LOJA
    ====================================================== */
    function renderLoja() {
      const loja = document.getElementById("loja");
      if (!loja) return;

      loja.innerHTML = "";

      const configRaridades = [
        {
          id: "comum",
          titulo: "⚪ Comum",
          subtitulo: "Itens básicos para progresso rápido.",
          classeTitulo: "titulo-comum"
        },
        {
          id: "raro",
          titulo: "🔵 Raro",
          subtitulo: "Recompensas melhores e benefícios valiosos.",
          classeTitulo: "titulo-raro"
        },
        {
          id: "epico",
          titulo: "🟣 Épico",
          subtitulo: "Itens especiais e recompensas poderosas.",
          classeTitulo: "titulo-epico"
        },
        {
          id: "lendario",
          titulo: "🟡 Lendário",
          subtitulo: "Os itens mais raros e desejados da loja.",
          classeTitulo: "titulo-lendario"
        }
      ];

      configRaridades.forEach(secao => {
        const itens = recompensas
          .filter(item => (item.raridade || "comum") === secao.id)
          .sort((a, b) => a.preco - b.preco);

        if (!itens.length) return;

        const wrapper = document.createElement("section");
         wrapper.className = `secao-raridade ${secao.id}`;
         wrapper.id = `secao-${secao.id}`;

        wrapper.innerHTML = `
          <div class="titulo-raridade ${secao.classeTitulo}">
            <span>${secao.titulo}</span>
          </div>

          <p class="subtitulo-raridade">${secao.subtitulo}</p>

          <div class="faixa-raridade"></div>
          <br>

          <div class="grid-raridade"></div>
        `;

        const grid = wrapper.querySelector(".grid-raridade");

        itens.forEach(item => {
          const podeComprar = spAluno >= item.preco;

          const card = document.createElement("div");
          card.classList.add("card");
          card.classList.add("raridade-" + (item.raridade || "comum"));

          if (item.lendario) {
            card.classList.add("lendario");
          }

          card.innerHTML = `
            ${item.lendario ? '<div class="badge">LENDÁRIO</div>' : ""}

            <h3>${item.nome}</h3>
            <p class="desc">${item.descricao}</p>

            ${item.id === "chaveiro-univers3d" ? `
              <div class="estoque-baixo">
                🔥 Restam apenas ${estoqueChaveiro} unidades
              </div>
            ` : ""}

            <div class="preco">🧪 ${item.preco} SP</div>

            <button
              ${!podeComprar || (item.id === "chaveiro-univers3d" && estoqueChaveiro <= 0) ? "disabled" : ""}
              onclick="comprar('${item.id}')"
            >
              ${
                item.id === "chaveiro-univers3d" && estoqueChaveiro <= 0
                  ? "Esgotado"
                  : podeComprar
                  ? "Comprar"
                  : "SP insuficiente"
              }
            </button>
          `;

          grid.appendChild(card);
        });

        loja.appendChild(wrapper);
      });
    }

    /* ======================================================
       LIBERAR ACESSO AO RANKING
    ====================================================== */
    async function liberarAcessoRanking(item) {
      const user = auth.currentUser;
      const snap = await getDoc(userRef);
      const dados = snap.data();

      const agora = new Date();

      const sciencePointsAntes = dados.sciencePoints || 0;
      const sciencePointsDepois = sciencePointsAntes - item.preco;

      let base = agora;
      let rankingAntes = null;

      if (
        dados.rankingLiberadoAte &&
        typeof dados.rankingLiberadoAte.toDate === "function"
      ) {
        const dataAtualRanking = dados.rankingLiberadoAte.toDate();
        rankingAntes = dataAtualRanking.toISOString();

        if (dataAtualRanking > agora) {
          base = dataAtualRanking;
        }
      }

      const novaData = new Date(base);
      novaData.setDate(novaData.getDate() + item.dias);

      await updateDoc(userRef, {
        sciencePoints: sciencePointsDepois,
        rankingLiberadoAte: Timestamp.fromDate(novaData),
        rankingPlano: `${item.dias}dias`,
        rankingCompradoEm: serverTimestamp()
      });

      spAluno = sciencePointsDepois;
      atualizarSPNaTela();

      await salvarBeneficioInventario(user.uid, "ranking", {
        tipo: "ranking",
        nome: item.nome,
        origem: "loja",
        status: "ativo",
        descricao: `Acesso ao ranking liberado por ${item.dias} dias.`,
        ativadoEm: serverTimestamp(),
        expiraEm: Timestamp.fromDate(novaData),
        detalhes: {
          dias: item.dias,
          plano: `${item.dias}dias`
        }
      });

      await logCompraRanking({
        uid: user.uid,
        itemId: item.id,
        itemNome: item.nome,
        sciencePointsAntes,
        sciencePointsDepois,
        rankingAntes,
        rankingDepois: novaData.toISOString(),
        dias: item.dias
      });

      await registrarCompra(`comprou acesso ao ranking por ${item.dias} dias`);
    }

    /* ======================================================
       ROLETA
    ====================================================== */
    function abrirRoleta() {
      const premios = [
        { label: "⚡ +200 XP", xp: 200 },
        { label: "⚡ +300 XP", xp: 300 },
        { label: "⚡ +400 XP", xp: 400 },
        { label: "⚡ +500 XP", xp: 500 },
        { label: "⚡ +600 XP", xp: 600 },
        { label: "⚡ +800 XP", xp: 800 }
      ];

      const modal = document.getElementById("roletaModal");
      if (!modal) return;

      modal.innerHTML = `
        <div class="roleta-overlay">
          <div class="roleta-container">
            <div style="position:relative;width:420px;margin:auto">
              <div class="seta">🔻</div>
              <div id="roleta" class="roleta"></div>

              <button class="btn-girar" onclick="girarRoleta()">
                🎯 Girar Roleta
              </button>

              <div class="resultado-final"></div>
            </div>
          </div>
        </div>
      `;

      const roleta = document.getElementById("roleta");
      if (!roleta) return;

      premios.forEach((p, i) => {
        const ang = (360 / premios.length) * i + (360 / premios.length) / 2;

        const label = document.createElement("div");
        label.className = "roleta-label";
        label.style.transform = `rotate(${ang}deg) translateY(-180px)`;
        label.innerText = p.label;

        roleta.appendChild(label);
      });
    }

    async function girarRoleta() {
      if (girando) return;
      girando = true;

      const roleta = document.getElementById("roleta");
      const botao = document.querySelector(".btn-girar");

      if (!roleta || !botao) {
        girando = false;
        return;
      }

      botao.style.display = "none";

      const premios = [
        { label: "⚡ +200 XP", xp: 200 },
        { label: "⚡ +300 XP", xp: 300 },
        { label: "⚡ +400 XP", xp: 400 },
        { label: "⚡ +500 XP", xp: 500 },
        { label: "⚡ +600 XP", xp: 600 },
        { label: "⚡ +800 XP", xp: 800 }
      ];

      const premioIndex = Math.floor(Math.random() * premios.length);
      const anguloPorItem = 360 / premios.length;
      const anguloFinal = (360 - (premioIndex * anguloPorItem)) - (anguloPorItem / 2);
      const voltas = 360 * 10;
      const rotacao = voltas + anguloFinal;

      roleta.style.transition = "transform 9s cubic-bezier(0.12,0.8,0.2,1)";
      roleta.style.transform = `rotate(${rotacao}deg)`;

      setTimeout(() => {
        roleta.style.transition = "transform 0.4s ease-out";
        roleta.style.transform = `rotate(${rotacao - 8}deg)`;

        setTimeout(() => {
          roleta.style.transform = `rotate(${rotacao}deg)`;
        }, 200);
      }, 9000);

      setTimeout(async () => {
        try {
          const user = auth.currentUser;
          const premio = premios[premioIndex];

          const snap = await getDoc(userRef);
          const dados = snap.data();

          const xpAntes = dados.xp || 0;
          const nivelAntes = dados.nivel || 0;
          const sciencePointsAntes = dados.sciencePoints || 0;

          const xpDepois = xpAntes + premio.xp;
          const sciencePointsDepois = sciencePointsAntes;

          await updateDoc(userRef, {
            xp: xpDepois
          });

          await registrarCompra(`girou a Roleta Científica e recebeu +${premio.xp} XP`);

          await logRoleta({
            uid: user.uid,
            itemId: "roleta-cientifica",
            itemNome: "🎡 Roleta Científica",
            sciencePointsAntes,
            sciencePointsDepois,
            xpAntes,
            xpDepois,
            nivelAntes,
            nivelDepois: nivelAntes,
            premioXp: premio.xp
          });

          const resultado = document.querySelector(".resultado-final");
          if (resultado) {
            resultado.innerHTML = `
              <h2>🎉 Resultado</h2>

              <p style="font-size:26px;margin:20px 0;">
                Você recebeu <b>${premio.xp} XP</b>
              </p>

              <button onclick="fecharRoleta()">Fechar</button>
            `;
          }
        } catch (erro) {
          console.error("Erro ao girar roleta:", erro);
          mostrarErro("Erro ao concluir a roleta.");
        } finally {
          girando = false;
        }
      }, 9400);
    }

    /* ======================================================
       CAIXAS
    ====================================================== */
    function abrirCaixa(tipo) {
      let premios = [];

      if (tipo === "caixa-basica") {
        premios = [
          { xp: 20, raridade: "comum" },
          { xp: 30, raridade: "comum" },
          { xp: 40, raridade: "raro" },
          { xp: 50, raridade: "raro" }
        ];
      }

      if (tipo === "caixa-cientifica") {
        premios = [
          { xp: 60, raridade: "raro" },
          { xp: 80, raridade: "raro" },
          { xp: 120, raridade: "epico" },
          { xp: 150, raridade: "epico" }
        ];
      }

      if (tipo === "caixa-lendaria") {
        premios = [
          { xp: 200, raridade: "epico" },
          { xp: 300, raridade: "lendario" },
          { xp: 400, raridade: "lendario" }
        ];
      }

      const premio = premios[Math.floor(Math.random() * premios.length)];
      const modal = document.getElementById("modal");
      if (!modal) return;

      modal.innerHTML = `
        <div class="modal">
          <div class="modal-box" style="position:relative">
            <div id="caixaIcon" class="caixa-loot">📦</div>
            <h2>Abrindo caixa...</h2>
          </div>
        </div>
      `;

      setTimeout(() => {
        const caixaIcon = document.getElementById("caixaIcon");
        if (caixaIcon) {
          caixaIcon.className = "explosao";
          caixaIcon.innerHTML = "💥";
        }
      }, 1500);

      setTimeout(() => {
        const box = document.querySelector(".modal-box");
        if (!box) return;

        for (let i = 0; i < 20; i++) {
          const p = document.createElement("div");
          p.className = "particulas";
          p.style.setProperty("--x", (Math.random() * 400 - 200) + "px");
          p.style.setProperty("--y", (Math.random() * 400 - 200) + "px");
          box.appendChild(p);
        }
      }, 1700);

      setTimeout(async () => {
        try {
          const user = auth.currentUser;
          const snap = await getDoc(userRef);
          const dados = snap.data();

          const xpAntes = dados.xp || 0;
          const nivelAntes = dados.nivel || 0;
          const xpDepois = xpAntes + premio.xp;

          await updateDoc(userRef, {
            xp: xpDepois
          });

          const nomesCaixas = {
            "caixa-basica": "🧪 Caixa Básica",
            "caixa-cientifica": "⚛ Caixa Científica",
            "caixa-lendaria": "👑 Caixa Lendária"
          };

          await registrarCompra(`abriu ${nomesCaixas[tipo]} e recebeu +${premio.xp} XP`);

          await logAberturaCaixa({
            uid: user.uid,
            itemId: tipo,
            itemNome: nomesCaixas[tipo],
            xpAntes,
            xpDepois,
            nivelAntes,
            nivelDepois: nivelAntes,
            premioXp: premio.xp
          });

          modal.innerHTML = `
            <div class="modal">
              <div class="modal-box">
                <div class="explosao">🎁</div>

                <h2 class="raridade-${premio.raridade}-premio">
                  ${premio.raridade.toUpperCase()}
                </h2>

                <div class="premio-xp">
                  ⚡ +${premio.xp} XP
                </div>

                <br>

                <button onclick="fecharCaixa()">Continuar</button>
              </div>
            </div>
          `;
        } catch (erro) {
          console.error("Erro ao abrir caixa:", erro);
          mostrarErro("Erro ao concluir a abertura da caixa.");
        }
      }, 2600);
    }

    /* ======================================================
       PRÊMIO FÍSICO
    ====================================================== */
    async function premioChaveiro() {
      try {
        const user = auth.currentUser;
        const ref = doc(db, "loja", "chaveiro-univers3d");

        const [snapEstoque, snapUser] = await Promise.all([
          getDoc(ref),
          getDoc(userRef)
        ]);

        const dadosEstoque = snapEstoque.data();
        const dadosUser = snapUser.data();

        if (!dadosEstoque || dadosEstoque.estoque <= 0) {
          alert("❌ Chaveiros esgotados!");
          return;
        }

        const sciencePointsAntes = dadosUser.sciencePoints || 0;
        const sciencePointsDepois = sciencePointsAntes - 1500;

        await updateDoc(userRef, {
          sciencePoints: sciencePointsDepois
        });

        spAluno = sciencePointsDepois;
        atualizarSPNaTela();

        await updateDoc(ref, {
          estoque: dadosEstoque.estoque - 1
        });

        estoqueChaveiro--;

        await adicionarAoInventario(user.uid, {
          tipo: "premio-fisico",
          itemId: "chaveiro-univers3d",
          nome: "🔑 Chaveiro Univers3D",
          origem: "loja",
          status: "resgatado",
          descricao: "Prêmio físico resgatado na loja.",
          detalhes: {
            estoqueConsumido: 1
          }
        });

        await logPremioFisico({
          uid: user.uid,
          itemId: "chaveiro-univers3d",
          itemNome: "🔑 Chaveiro Univers3D",
          sciencePointsAntes,
          sciencePointsDepois
        });

        await registrarCompra("resgatou 🔑 Chaveiro Univers3D");

        renderLoja();

        const modal = document.getElementById("modal");
        if (!modal) return;

        modal.innerHTML = `
          <div class="modal">
            <div class="modal-box lendario-bg">
              <div class="chaveiro-anim">🔑</div>

              <h2>🏆 PRÊMIO LENDÁRIO</h2>
              <h3>Chaveiro Univers3D</h3>

              <p>Você ganhou um prêmio físico!</p>

              <div class="selo-patrocinio">
                Patrocinado por @univers3d
              </div>

              <br>

              <button onclick="fecharCaixa()">Continuar</button>
            </div>
          </div>
        `;
      } catch (erro) {
        console.error("Erro ao resgatar chaveiro:", erro);
        mostrarErro("Erro ao resgatar o chaveiro.");
      }
    }

    /* ======================================================
       COMPRAR ITENS
    ====================================================== */
    window.comprar = async function(id) {
      try {
        const item = recompensas.find(r => r.id === id);
        if (!item) return;

        if (spAluno < item.preco) {
          alert("SciencePoints insuficientes!");
          return;
        }

        if (
          id === "caixa-basica" ||
          id === "caixa-cientifica" ||
          id === "caixa-lendaria"
        ) {
          spAluno -= item.preco;

          await updateDoc(userRef, {
            sciencePoints: spAluno
          });

          atualizarSPNaTela();
          abrirCaixa(id);
          return;
        }

        if (id === "chaveiro-univers3d") {
          await premioChaveiro();
          return;
        }

        if (id === "roleta-cientifica") {
          spAluno -= item.preco;

          await updateDoc(userRef, {
            sciencePoints: spAluno
          });

          atualizarSPNaTela();
          abrirRoleta();
          return;
        }

        if (item.tipo === "ranking") {
          await liberarAcessoRanking(item);
          renderLoja();

          const modal = document.getElementById("modal");
          if (!modal) return;

          modal.innerHTML = `
            <div class="modal">
              <div class="modal-box">
                <div class="explosao">🏆</div>

                <h2>Acesso liberado!</h2>

                <p style="font-size:20px;margin-top:15px;">
                  Você liberou o ranking por <b>${item.dias} dias</b>.
                </p>

                <br>

                <button onclick="fecharCaixa()">Continuar</button>
              </div>
            </div>
          `;
          return;
        }

        if (item.xp) {
          const user = auth.currentUser;
          const snap = await getDoc(userRef);
          const dados = snap.data();

          const xpAntes = dados.xp || 0;
          const nivelAntes = dados.nivel || 0;
          const sciencePointsAntes = dados.sciencePoints || 0;

          const xpDepois = xpAntes + item.xp;
          const sciencePointsDepois = sciencePointsAntes - item.preco;

          await updateDoc(userRef, {
            sciencePoints: sciencePointsDepois,
            xp: xpDepois
          });

          spAluno = sciencePointsDepois;
          atualizarSPNaTela();

          await registrarCompra(`comprou ${item.nome}`);

          await logCompraXP({
            uid: user.uid,
            itemId: item.id,
            itemNome: item.nome,
            sciencePointsAntes,
            sciencePointsDepois,
            xpAntes,
            xpDepois,
            nivelAntes,
            nivelDepois: nivelAntes
          });

          renderLoja();
          mostrarPopup(id);
        }
      } catch (erro) {
        console.error("Erro na compra:", erro);
        mostrarErro("Erro ao processar a compra.");
      }
    };

    /* ======================================================
       POPUP DE RECOMPENSAS
    ====================================================== */
    function mostrarPopup(tipo) {
      const overlay = document.getElementById("popupRecompensa");
      const anim = document.getElementById("popupAnimacao");
      const titulo = document.getElementById("popupTitulo");
      const desc = document.getElementById("popupDescricao");

      if (!overlay || !anim || !titulo || !desc) return;

      overlay.classList.add("ativo");

      if (tipo === "xp20") {
        anim.innerHTML = "⚡";
        titulo.innerHTML = "+20 XP";
        desc.innerHTML = "Seu conhecimento aumentou!";
      }

      if (tipo === "xp50") {
        anim.innerHTML = "⚡⚡";
        titulo.innerHTML = "+50 XP";
        desc.innerHTML = "Bônus científico médio!";
      }

      if (tipo === "xp100") {
        anim.innerHTML = "⚡⚡⚡";
        titulo.innerHTML = "+100 XP";
        desc.innerHTML = "Grande avanço científico!";
      }

      if (tipo === "caixa-basica") {
        anim.innerHTML = "📦";
        titulo.innerHTML = "Caixa Básica";
        desc.innerHTML = "Abrindo recompensas...";
      }

      if (tipo === "caixa-cientifica") {
        anim.innerHTML = "⚛";
        titulo.innerHTML = "Caixa Científica";
        desc.innerHTML = "Recompensas raras!";
      }

      if (tipo === "caixa-lendaria") {
        anim.innerHTML = "👑";
        titulo.innerHTML = "Caixa Lendária";
        desc.innerHTML = "Recompensa épica!";
      }

      if (tipo === "chaveiro-univers3d") {
        anim.innerHTML = "🔑";
        titulo.innerHTML = "Chaveiro 3D";
        desc.innerHTML = "Você ganhou um prêmio físico!";
      }
    }

    /* ======================================================
       FUNÇÕES GLOBAIS
    ====================================================== */
    window.fecharPopup = function() {
      const popup = document.getElementById("popupRecompensa");
      if (popup) popup.classList.remove("ativo");
    };

    window.fecharCaixa = function() {
      const modal = document.getElementById("modal");
      if (modal) modal.innerHTML = "";
      renderLoja();
    };

    window.fecharRoleta = function() {
      const modal = document.getElementById("roletaModal");
      if (modal) modal.innerHTML = "";
      renderLoja();
    };

    window.girarRoleta = girarRoleta;

      /* ======================================================
   MENU ATIVO POR SEÇÃO VISÍVEL
====================================================== */
function iniciarMenuAtivo() {
  const links = document.querySelectorAll(".menu-loja a[data-target]");
  if (!links.length) return;

  const secoesIds = Array.from(links).map(link => link.dataset.target);
  const secoes = secoesIds
    .map(id => document.getElementById(id))
    .filter(Boolean);

  if (!secoes.length) return;

  function ativarLink(idAtivo) {
    links.forEach(link => {
      const ativo = link.dataset.target === idAtivo;
      link.classList.toggle("ativo", ativo);
    });
  }

  function detectarSecaoAtiva() {
    const linhaReferencia = window.innerHeight * 0.30;
    let secaoAtual = "topo";

    for (const secao of secoes) {
      const rect = secao.getBoundingClientRect();

      if (rect.top <= linhaReferencia) {
        secaoAtual = secao.id;
      }
    }

    ativarLink(secaoAtual);
  }

  links.forEach(link => {
    link.addEventListener("click", () => {
      const alvo = link.dataset.target;
      ativarLink(alvo);
    });
  });

  window.addEventListener("scroll", detectarSecaoAtiva, { passive:true });
  window.addEventListener("resize", detectarSecaoAtiva);

  detectarSecaoAtiva();
}

    /* ======================================================
       INICIALIZAÇÃO
    ====================================================== */
    auth.onAuthStateChanged(user => {
  if (!user) return;

  iniciarAlertaGlobal();
  carregarSP();
  carregarHistorico();

  setTimeout(() => {
    iniciarMenuAtivo();
  }, 300);
});
  </script>
