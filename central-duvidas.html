<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❓ Central de Dúvidas</title>

<style>
/* ===============================
APPLE STYLE UI
=============================== */

*{
box-sizing:border-box;
}

body{

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
background:linear-gradient(180deg,#f8f9ff 0%,#eef1ff 100%);
margin:0;
padding:60px 30px;
color:#1f2937;

animation:fadeIn .6s ease;

}

/* ANIMAÇÃO ENTRADA */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.container{
max-width:920px;
margin:auto;
}

/* HEADER */

h1{

font-size:34px;
font-weight:700;
letter-spacing:-0.4px;
margin-bottom:6px;

}

.sub{

color:#6b7280;
font-size:15px;
margin-bottom:40px;

}

/* ===============================
CARD PRINCIPAL
=============================== */

.nova-duvida{

background:rgba(255,255,255,0.7);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

padding:24px;
border-radius:16px;

box-shadow:
0 8px 30px rgba(0,0,0,0.06),
0 1px 0 rgba(255,255,255,0.6) inset;

margin-bottom:35px;

transition:.25s;

}

.nova-duvida:hover{

box-shadow:
0 12px 40px rgba(0,0,0,0.08);

}

/* ===============================
TEXTAREA
=============================== */

textarea{

width:100%;
height:90px;

border-radius:12px;
border:1px solid #e5e7eb;

padding:14px;
font-size:15px;

background:white;

outline:none;

transition:.2s;

}

textarea:focus{

border-color:#6366f1;

box-shadow:
0 0 0 3px rgba(99,102,241,0.12);

}

/* ===============================
BOTÕES
=============================== */

button{

border:none;
border-radius:30px;

padding:8px 16px;

font-size:13px;
font-weight:600;

cursor:pointer;

transition:.18s cubic-bezier(.4,0,.2,1);

}

/* botão principal */

.btn-primary{

background:#4f46e5;
color:white;

box-shadow:0 4px 12px rgba(79,70,229,.25);

}

.btn-primary:hover{

transform:translateY(-1px);

box-shadow:0 6px 16px rgba(79,70,229,.35);

}

.btn-primary:active{

transform:scale(.96);

}

/* botão neutro */

.btn{

background:#f1f5f9;

}

.btn:hover{

background:#e2e8f0;

}

/* apagar */

.btn-danger{

background:#ef4444;
color:white;

}

.btn-danger:hover{

background:#dc2626;

}

/* ===============================
LISTA
=============================== */

.lista{

display:flex;
flex-direction:column;
gap:18px;

}

/* ===============================
CARD PERGUNTA
=============================== */

.card{

background:rgba(255,255,255,0.75);

backdrop-filter:blur(14px);

padding:22px;

border-radius:16px;

box-shadow:
0 6px 22px rgba(0,0,0,0.05);

cursor:pointer;

transition:.22s;

}

.card:hover{

transform:translateY(-4px);

box-shadow:
0 14px 38px rgba(0,0,0,0.08);

}

/* ===============================
PERGUNTA
=============================== */

.pergunta{

font-size:19px;
font-weight:600;
margin-bottom:12px;

}

/* ===============================
INFO
=============================== */

.info{

font-size:13px;
color:#6b7280;

display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;

}

/* ===============================
PATENTE
=============================== */

.patente{

width:20px;
opacity:.9;

}

/* ===============================
LIKE
=============================== */

.like{

cursor:pointer;
font-weight:600;

display:flex;
align-items:center;
gap:4px;

transition:.15s;

}

.like:hover{

color:#4f46e5;
transform:scale(1.08);

}

/* ===============================
PROFESSOR (APPLE GOLD)
=============================== */

.professor{

border-left:4px solid #d4af37;

background:
linear-gradient(
to right,
rgba(255,250,230,.8),
rgba(255,255,255,.8)
);

position:relative;

}

.professor::after{

content:"";

position:absolute;
inset:0;

border-radius:16px;

pointer-events:none;

box-shadow:
0 0 0 1px rgba(212,175,55,0.25),
0 0 20px rgba(212,175,55,0.12);

}

/* badge */

.badge-prof{

background:
linear-gradient(
135deg,
#d4af37,
#f6d365
);

color:#4a3a00;

font-size:11px;
font-weight:700;

padding:3px 10px;

border-radius:20px;

letter-spacing:.3px;

}

/* ===============================
IA BOX
=============================== */

.ia-box{

margin-top:18px;

background:
linear-gradient(
135deg,
#eef2ff,
#f8faff
);

padding:16px;

border-radius:12px;

border:1px solid #e0e7ff;

animation:fadeIn .3s ease;

}

/* ===============================
ACTION BAR
=============================== */

.action-bar{

margin-top:12px;
display:flex;
gap:10px;

}

#textoRespostaIA::after{
content:"|";
animation:blink 1s infinite;
margin-left:2px;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>❓ Central de Dúvidas</h1>

<div class="sub">
Pergunte, responda e ajude colegas a aprender 🚀
</div>

</div>

<div class="nova-duvida">

<textarea id="pergunta" placeholder="Digite sua dúvida..."></textarea>

<br><br>

<button class="btn-primary" onclick="criarDuvida()">
Enviar dúvida
</button>

<div id="respostaIA" class="ia-box" style="display:none">

<div class="ia-title">
🤖 Prof. <strong>IA</strong>rlisson
</div>

<p id="textoRespostaIA"></p>

<div class="ia-actions">

<button class="btn-primary" onclick="resolverIA()">✔ Resolvido</button>

<button class="btn" onclick="perguntarProfessor()">❓ Perguntar ao professor</button>

</div>

</div>

</div>

<div class="lista" id="listaDuvidas"></div>

</div>

<script type="module">

import { db, auth } from "./js/firebase.js";

import {
collection,
addDoc,
query,
orderBy,
getDocs,
serverTimestamp,
doc,
updateDoc,
increment,
getDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

import { obterPatentePorNivel }
from "./js/patentes.js";

import { buscarResposta }
from "./IA/ia-duvidas.js";

let usuarioAtual=null;
let perguntaPendente=null;

/* BUSCAR USUÁRIO */

async function buscarUsuario(uid){

if(!uid) return {nome:"Aluno",nivel:0};

const ref=doc(db,"usuarios",uid);
const snap=await getDoc(ref);

if(!snap.exists()) return {nome:"Aluno",nivel:0};

return snap.data();

}

/* LOGIN */

onAuthStateChanged(auth,async(user)=>{

if(!user){

alert("Você precisa estar logado.");
window.location="index.html";
return;

}

usuarioAtual=user;

carregarDuvidas();

});

/* SALVAR DÚVIDA */

async function salvarDuvida(texto){

const usuario=await buscarUsuario(usuarioAtual.uid);

await addDoc(collection(db,"duvidas"),{

pergunta:texto,
uid:usuarioAtual.uid,
autor:usuario.nome || usuarioAtual.email,
nivel:usuario.nivel || 0,

likes:0,
respostas:0,
resolvida:false,
timestamp:serverTimestamp()

});

}

/* LIKE */

window.curtirDuvida=async function(id){

await updateDoc(doc(db,"duvidas",id),{
likes:increment(1)
});

carregarDuvidas();

}

/* APAGAR PERGUNTA */

window.apagarPergunta=async function(id){

if(!confirm("Apagar pergunta?")) return;

const refRespostas=collection(db,"duvidas",id,"respostas");

const snapshot=await getDocs(refRespostas);

for(const docu of snapshot.docs){

await deleteDoc(doc(db,"duvidas",id,"respostas",docu.id));

}

await deleteDoc(doc(db,"duvidas",id));

carregarDuvidas();

}

/* CARREGAR DÚVIDAS */

async function carregarDuvidas(){

const lista=document.getElementById("listaDuvidas");

lista.innerHTML="";

const q=query(
collection(db,"duvidas"),
orderBy("timestamp","desc")
);

const snapshot=await getDocs(q);

for(const docu of snapshot.docs){

const d=docu.data();

const usuario=await buscarUsuario(d.uid);

const patente=obterPatentePorNivel(usuario.nivel || d.nivel || 0);

const isProfessor=usuario?.tipo==="professor";

const data=d.timestamp?.toDate();

const hora=data
? data.toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short"})
: "";

const card=document.createElement("div");

card.className="card";

if(isProfessor) card.classList.add("professor");

card.onclick=()=>{
window.location="duvida.html?id="+docu.id;
};

card.innerHTML=`

${isProfessor?`<div class="tipo">👨‍🏫 Pergunta do professor</div>`:""}

<div class="pergunta">${d.pergunta}</div>

<div class="info">

<img class="patente" src="${patente.imagem}">

<span>${usuario.nome || d.autor || "Aluno"}</span>

${isProfessor?`<span class="badge-prof">PROFESSOR</span>`:""}

<span>Nv.${usuario.nivel || d.nivel || 0}</span>

<span>🕒 ${hora}</span>

<span>💬 ${d.respostas || 0}</span>

<span class="like"
onclick="event.stopPropagation();curtirDuvida('${docu.id}')">
👍 ${d.likes || 0}
</span>

</div>

`;

const atual=await buscarUsuario(usuarioAtual.uid);

if(atual.tipo==="professor"){

const bar=document.createElement("div");
bar.className="action-bar";

const btn=document.createElement("button");
btn.className="btn-danger";
btn.innerText="🗑 Apagar";

btn.onclick=(e)=>{
e.stopPropagation();
apagarPergunta(docu.id);
};

bar.appendChild(btn);

card.appendChild(bar);

}

lista.appendChild(card);

}

}

async function digitarIA(texto){

const elemento = document.getElementById("textoRespostaIA");

elemento.innerHTML = "";

let i = 0;

const velocidade = 18; // ms por letra

function escrever(){

if(i < texto.length){

elemento.innerHTML += texto.charAt(i);

i++;

setTimeout(escrever, velocidade);

}

}

escrever();

}

/* CRIAR DÚVIDA */

window.criarDuvida=async function(){

const campo=document.getElementById("pergunta");

const texto=campo.value.trim();

if(!texto) return;

const resposta=buscarResposta(texto);

if(resposta){

perguntaPendente=texto;

digitarIA(resposta);

document.getElementById("respostaIA").style.display="block";

return;

}

await salvarDuvida(texto);

campo.value="";

carregarDuvidas();

}

/* IA */

window.resolverIA=function(){

document.getElementById("respostaIA").style.display="none";

document.getElementById("pergunta").value="";

perguntaPendente=null;

}

window.perguntarProfessor=async function(){

if(!perguntaPendente) return;

await salvarDuvida(perguntaPendente);

document.getElementById("respostaIA").style.display="none";

document.getElementById("pergunta").value="";

perguntaPendente=null;

carregarDuvidas();

}

</script>

</body>
</html>
