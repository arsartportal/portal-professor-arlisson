<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta

<title>Avatar Editor</title>

<link

                 ACESSÓRIOS
            ========================================== -->

                <h3>Acessórios</h3>

                        draggable="true"

        <!-- =========================================
             AVATAR
        ========================================== -->

        <div class="avatar-side">

            <div
                class="avatar-box"
                id="avatar-box"
            >

                <!-- =========================================
                     BASE
                ========================================== -->

                <img
                    id="base-layer"
                    class="layer"
                    src="/assets/avatares/1-bases/masculino-1.png"
                >

                <!-- =========================================
                     INFERIOR
                ========================================== -->

                <img
                    id="inferior-layer"
                    class="layer"
                    src="/assets/avatares/4-inferior/inferior-1.png"
                >

                <!-- =========================================
                     SUPERIOR
                ========================================== -->

                <img
                    id="superior-layer"
                    class="layer"
                    src="/assets/avatares/3-superior/superior-1.png"
                >

                <!-- =========================================
                     CABELO
                ========================================== -->

                <img
                    id="cabelo-layer"
                    class="layer"
                    src="/assets/avatares/2-cabelos/cabelo-1.png"
                >

                <!-- =========================================
                     ACESSÓRIO
                ========================================== -->

                <img
                    id="acessorio-layer"
                    class="layer"
                    src="/assets/avatares/5-acessorios/oculos-1.png"
                >

            </div>

            <!-- =========================================
                 CONTROLES
            ========================================== -->

            <div class="layer-controls">

                <button data-layer="base">
                    🔒 Base
                </button>

                <button data-layer="inferior">
                    👖 Inferior
                </button>

                <button data-layer="superior">
                    👕 Superior
                </button>

                <button data-layer="cabelo">
                    💇 Cabelo
                </button>

                <button data-layer="acessorio">
                    🕶 Acessório
                </button>

            </div>

            <!-- =========================================
                 ACTIONS
            ========================================== -->

            <div class="editor-actions">

                <button
                    id="delete-layer-btn"
                    class="danger-btn"
                >

                    🗑 Deletar Layer

                </button>

                <button
                    id="reset-avatar-btn"
                    class="secondary-btn"
                >

                    ♻ Resetar Avatar

                </button>

                <button
                    id="save-avatar-btn"
                    class="primary-btn"
                >

                    💾 Salvar Avatar

                </button>

            </div>

            <!-- =========================================
                 INFO
            ========================================== -->

            <div class="info-box">

                <strong>🎮 Controles:</strong>

                <br><br>

                🖱 Arraste para mover

                <br>

                🎡 Scroll para redimensionar

                <br>

                🔒 Trave layers

                <br>

                📦 Arraste itens do inventário

                <br>

                💾 Salve quando terminar

            </div>

        </div>

<script src="./avatar-preview.js"></script>
