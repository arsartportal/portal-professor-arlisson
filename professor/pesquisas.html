<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔬 Banco de Pesquisas | Portal do Professor</title>

<script src="banco-pesquisas.js"></script>

<style>
/* ==============================
   BASE
============================== */

body{
font-family:Inter,Segoe UI,system-ui,-apple-system,sans-serif;
margin:0;
padding:50px;
color:#1e293b;

background:
radial-gradient(circle at 10% 20%,rgba(120,119,198,0.15),transparent 40%),
radial-gradient(circle at 90% 80%,rgba(44,123,229,0.15),transparent 40%),
linear-gradient(135deg,#eef2f9,#dce6f4);
}

/* ==============================
   TITULO
============================== */

h1{
font-size:36px;
font-weight:700;
letter-spacing:-1px;
margin-bottom:4px;
}

.sub{
opacity:.6;
margin-bottom:35px;
font-size:14px;
}

/* ==============================
   TOPO
============================== */

.topo{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
align-items:center;
}

/* ==============================
   BUSCA
============================== */

input{
padding:14px 16px;
border-radius:12px;
border:1px solid rgba(0,0,0,0.08);
width:280px;
font-size:14px;

background:white;

box-shadow:
0 6px 18px rgba(0,0,0,0.06),
0 1px 2px rgba(0,0,0,0.08);

transition:.25s;
}

input:focus{
outline:none;
border-color:#2c7be5;

box-shadow:
0 6px 20px rgba(44,123,229,0.25);
}

/* ==============================
   BOTÕES
============================== */

button{
border:none;
border-radius:12px;
padding:12px 18px;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:.2s;

display:flex;
align-items:center;
gap:6px;
}

button:hover{
transform:translateY(-2px);
}

/* BOTÃO ALEATÓRIO */

.btn-random{
background:linear-gradient(135deg,#8e44ad,#5e2d79);
color:white;

box-shadow:
0 10px 25px rgba(0,0,0,0.2);
}

/* BOTÃO AULA */

.btn-aula{
background:linear-gradient(135deg,#ff9f43,#e67e22);
color:white;

box-shadow:
0 10px 25px rgba(0,0,0,0.2);
}

/* ==============================
   FILTROS
============================== */

.filtros{
display:flex;
gap:12px;
margin-bottom:30px;
flex-wrap:wrap;
}

.filtro{
background:white;
border:1px solid rgba(0,0,0,0.08);
}

.filtro.ativo{

background:linear-gradient(135deg,#2c7be5,#1c5ed6);
color:white;

box-shadow:
0 10px 20px rgba(44,123,229,0.35);

}

/* ==============================
   GRID
============================== */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(340px,1fr));

gap:24px;

}

/* ==============================
   CARD
============================== */

.card{

background:rgba(255,255,255,0.85);

backdrop-filter:blur(14px);

border-radius:18px;

padding:22px;

box-shadow:
0 15px 40px rgba(0,0,0,0.08),
0 3px 10px rgba(0,0,0,0.04);

transition:.25s;

position:relative;

overflow:hidden;

}

/* luz suave */

.card::before{

content:"";

position:absolute;

top:0;
left:0;
right:0;

height:5px;

background:linear-gradient(90deg,#2c7be5,#9b59b6);

opacity:.8;

}

/* hover */

.card:hover{

transform:translateY(-6px) scale(1.01);

box-shadow:
0 20px 50px rgba(0,0,0,0.18);

}

/* usado */

.usado{
border:2px solid #f1c40f;
}

/* ==============================
   TAG SÉRIE
============================== */

.serie{

font-size:11px;

font-weight:700;

background:#eef3ff;

padding:6px 12px;

border-radius:20px;

display:inline-block;

margin-bottom:12px;

letter-spacing:.5px;

}

/* ==============================
   PERGUNTA
============================== */

.pergunta{

font-size:17px;

font-weight:500;

line-height:1.5;

margin-bottom:12px;

}

/* ==============================
   RESPOSTA
============================== */

.resposta{

display:none;

margin-top:12px;

padding:14px;

background:#f7faff;

border-radius:10px;

font-size:14px;

line-height:1.6;

border-left:4px solid #2c7be5;

}

/* ==============================
   AÇÕES
============================== */

.acoes{

display:flex;

gap:10px;

margin-top:12px;

flex-wrap:wrap;

}

/* botões */

.copiar{
background:#2ecc71;
color:white;
}

.ver{
background:#34495e;
color:white;
}

.xp{

background:linear-gradient(135deg,#f1c40f,#f39c12);

color:#2c3e50;

font-weight:700;

}

/* ==============================
   MODAL BACKDROP
============================== */

.modal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(15,23,42,0.55);

backdrop-filter:blur(12px);

justify-content:center;
align-items:center;

z-index:2000;

animation:fade .25s ease;

}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* ==============================
   MODAL BOX
============================== */

.modal-box{

background:rgba(255,255,255,0.92);

backdrop-filter:blur(16px);

border-radius:22px;

padding:40px;

max-width:650px;
width:90%;

box-shadow:

0 35px 90px rgba(0,0,0,0.35),
0 8px 30px rgba(0,0,0,0.18);

animation:popup .28s cubic-bezier(.2,.8,.2,1);

position:relative;

}

/* animação */

@keyframes popup{

from{

transform:translateY(25px) scale(.95);
opacity:0;

}

to{

transform:translateY(0) scale(1);
opacity:1;

}

}

/* ==============================
   PERGUNTA
============================== */

.modal-box h2{

font-size:24px;

font-weight:700;

margin-top:0;

margin-bottom:18px;

line-height:1.4;

color:#1e293b;

}

/* ==============================
   RESPOSTA
============================== */

.modal-resposta{

display:none;

margin-top:20px;

padding:16px 18px;

background:linear-gradient(135deg,#eef3ff,#e3ecff);

border-radius:12px;

font-size:15px;

line-height:1.6;

border-left:4px solid #2c7be5;

box-shadow:

0 6px 18px rgba(0,0,0,0.05);

}

/* ==============================
   BOTÕES
============================== */

.modal-box button{

margin-top:15px;

margin-right:10px;

border:none;

border-radius:10px;

padding:10px 16px;

font-weight:600;

cursor:pointer;

transition:.2s;

}

/* mostrar resposta */

.modal-box button:first-of-type{

background:#34495e;
color:white;

}

/* fechar */

.modal-box button:last-of-type{

background:#e2e8f0;

}

/* hover */

.modal-box button:hover{

transform:translateY(-2px);

box-shadow:0 6px 14px rgba(0,0,0,0.15);

}

</style>
</head>

<body>

<h1>🔬 Banco de Pesquisas</h1>
<div class="sub">Perguntas científicas para atividades e pesquisas</div>

<div class="topo">

<input id="busca" placeholder="🔎 Buscar pesquisa...">

<button class="btn-random" onclick="pesquisaAleatoria()">
🎲 Pesquisa da Aula
</button>

<button class="btn-aula" onclick="curiosidadeAula()">
🧠 Curiosidade da Aula
</button>

</div>

<div class="filtros">

<button class="filtro ativo" onclick="filtrar('todas',this)">Todas</button>
<button class="filtro" onclick="filtrar('1ano',this)">1º Ano</button>
<button class="filtro" onclick="filtrar('2ano',this)">2º Ano</button>
<button class="filtro" onclick="filtrar('3ano',this)">3º Ano</button>
<button class="filtro" onclick="filtrar('eja',this)">EJA</button>

</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->

<div id="modal" class="modal">
<div class="modal-box">

<h2 id="modalPergunta"></h2>

<div id="modalResposta" class="modal-resposta"></div>

<br>

<button onclick="mostrarResposta()">👁 Mostrar resposta</button>
<button onclick="fecharModal()">Fechar</button>

</div>
</div>

<script>

let serieAtual="todas"
const grid=document.getElementById("grid")

function render(lista){

grid.innerHTML=""

lista.forEach((p,i)=>{

const usado=localStorage.getItem("pesquisa_"+i)

grid.innerHTML+=`

<div class="card ${usado?'usado':''}">

<div class="serie">${p.serie.toUpperCase()}</div>

<div class="pergunta">${p.pergunta}</div>

<div class="acoes">

<button class="copiar" onclick="copiar('${p.pergunta}')">
📋 Copiar
</button>

<button class="ver" onclick="toggleResposta(${i})">
👁 Resposta
</button>

<button class="xp" onclick="marcarXP(${i})">
⭐ +XP
</button>

</div>

<div class="resposta" id="resposta${i}">
${p.resposta}
</div>

</div>
`

})

}

render(pesquisas)

function toggleResposta(id){

const r=document.getElementById("resposta"+id)

r.style.display = r.style.display==="block" ? "none" : "block"

}

function filtrar(serie,btn){

serieAtual=serie

document.querySelectorAll(".filtro").forEach(b=>b.classList.remove("ativo"))
btn.classList.add("ativo")

if(serie==="todas") render(pesquisas)
else render(pesquisas.filter(p=>p.serie===serie))

}

document.getElementById("busca").addEventListener("input",e=>{

const termo=e.target.value.toLowerCase()

const filtrado=pesquisas.filter(p=>
p.pergunta.toLowerCase().includes(termo) &&
(serieAtual==="todas"||p.serie===serieAtual)
)

render(filtrado)

})

function pesquisaAleatoria(){

const p=pesquisas[Math.floor(Math.random()*pesquisas.length)]

abrirModal(p)

}

function curiosidadeAula(){

const naoUsadas = pesquisas.filter((p,i)=>!localStorage.getItem("pesquisa_"+i))

if(naoUsadas.length===0){

alert("Todas as curiosidades já foram usadas!")

return

}

const p = naoUsadas[Math.floor(Math.random()*naoUsadas.length)]

abrirModal(p)

}

function abrirModal(p){

document.getElementById("modal").style.display="flex"
document.getElementById("modalPergunta").innerText=p.pergunta
document.getElementById("modalResposta").innerText=p.resposta
document.getElementById("modalResposta").style.display="none"

}

function mostrarResposta(){

document.getElementById("modalResposta").style.display="block"

}

function fecharModal(){

document.getElementById("modal").style.display="none"

}

function copiar(texto){

navigator.clipboard.writeText(texto)

alert("Pergunta copiada!")

}

function marcarXP(id){

localStorage.setItem("pesquisa_"+id,true)
render(pesquisas)

}

</script>

</body>
</html>
