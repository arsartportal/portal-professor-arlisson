<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sala de Aula • Portal</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="saladeaula.css">
</head>

<body>

<main class="container">

  <!-- HEADER -->
  <header class="topo">
    <h1>📚 Sala de Aula</h1>
    <p>Materiais organizados para uso em aula</p>
  </header>

  <!-- BUSCA -->
  <section class="acoes">
    <input type="text" id="busca" placeholder="Buscar material..." oninput="filtrarMateriais()">
  </section>

  <!-- CONTEÚDO DINÂMICO -->
  <section id="conteudo"></section>

</main>

<script src="saladeaula.js"></script>

<script>
/* =========================
   BUSCA (filtro simples)
========================= */
function filtrarMateriais() {
  const termo = document.getElementById("busca").value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const texto = card.innerText.toLowerCase();

    if (texto.includes(termo)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
