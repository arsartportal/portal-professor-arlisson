<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Aulas | Portal do Professor</title>

<style>

body{
font-family:'Segoe UI', Arial;
background:#f4f6fb;
margin:0;
padding:40px;
}

h1{
margin-bottom:30px;
}

.filtros{
display:flex;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.painel{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.aulas{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.aula{
background:white;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
transition:0.2s;
}

.aula:hover{
background:#eef2ff;
}

.atual{
background:#2ecc71;
color:white;
font-weight:bold;
}

</style>
</head>

<body>

<h1>📚 Controle de Andamento das Aulas</h1>

<div class="filtros">

<select id="escola">
<option>Audiocomunicação</option>
<option>Boto de Menezes</option>
<option>Maria Geny</option>
</select>

<select id="serie">
<option value="1ano">1º ano</option>
<option value="2ano">2º ano</option>
<option value="3ano">3º ano</option>
</select>

<select id="turma">
<option>A</option>
<option>B</option>
<option>D</option>
</select>

<select id="disciplina">
<option value="fisica">Física</option>
<option value="matematica">Matemática</option>
<option value="quimica">Química</option>
</select>

</div>

<div class="painel">
<h2>Aula atual: <span id="aulaAtual">--</span></h2>
</div>

<div class="aulas" id="listaAulas"></div>

<script type="module">

/* =====================================================
   IMPORTA FIREBASE
===================================================== */

import { db } from "../js/firebase.js"

import {
collection,
query,
where,
getDocs,
addDoc,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js"


/* =====================================================
   IMPORTA BANCO DE AULAS (1080)
===================================================== */

import { bancoAulas } from "./banco-aulas.js"


/* =====================================================
   ELEMENTOS HTML
===================================================== */

const listaDiv=document.getElementById("listaAulas")
const aulaAtualSpan=document.getElementById("aulaAtual")

const escolaSelect=document.getElementById("escola")
const serieSelect=document.getElementById("serie")
const turmaSelect=document.getElementById("turma")
const disciplinaSelect=document.getElementById("disciplina")



/* =====================================================
   ESCOLHE LISTA DE AULAS CORRETA
===================================================== */

function obterAulas(){

const disciplina = disciplinaSelect.value
const serie = serieSelect.value

return bancoAulas[disciplina][serie] || []

}



/* =====================================================
   CARREGAR PROGRESSO DO FIRESTORE
===================================================== */

async function carregar(){

const escola = escolaSelect.value
const serie = serieSelect.value
const turma = turmaSelect.value
const disciplina = disciplinaSelect.value

const q = query(
collection(db,"andamentoAulas"),
where("escola","==",escola),
where("serie","==",serie),
where("turma","==",turma),
where("disciplina","==",disciplina)
)

const snapshot = await getDocs(q)

let atual = 0

if(!snapshot.empty){
atual = snapshot.docs[0].data().aulaAtual
}

aulaAtualSpan.innerText = atual

render(atual)

}



/* =====================================================
   SALVAR PROGRESSO
===================================================== */

async function salvar(numero){

const escola = escolaSelect.value
const serie = serieSelect.value
const turma = turmaSelect.value
const disciplina = disciplinaSelect.value

const q = query(
collection(db,"andamentoAulas"),
where("escola","==",escola),
where("serie","==",serie),
where("turma","==",turma),
where("disciplina","==",disciplina)
)

const snapshot = await getDocs(q)

if(snapshot.empty){

await addDoc(collection(db,"andamentoAulas"),{

escola,
serie,
turma,
disciplina,
aulaAtual:numero,
atualizadoEm:new Date()

})

}else{

const documento = snapshot.docs[0]

await updateDoc(doc(db,"andamentoAulas",documento.id),{

aulaAtual:numero,
atualizadoEm:new Date()

})

}

carregar()

}



/* =====================================================
   RENDERIZAR AULAS
===================================================== */

function render(atual){

listaDiv.innerHTML=""

const aulas = obterAulas()

aulas.forEach((titulo,i)=>{

let num=i+1

let div=document.createElement("div")

div.className="aula"

if(num==atual){
div.classList.add("atual")
}

div.innerHTML=titulo

div.onclick=()=>salvar(num)

listaDiv.appendChild(div)

})

}



/* =====================================================
   EVENTOS DOS FILTROS
===================================================== */

escolaSelect.onchange=carregar
serieSelect.onchange=carregar
turmaSelect.onchange=carregar
disciplinaSelect.onchange=carregar



/* =====================================================
   INICIAR PÁGINA
===================================================== */

carregar()

</script>

</body>
</html>
