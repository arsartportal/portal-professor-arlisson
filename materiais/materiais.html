<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Materiais da Aula</title>

<link rel="stylesheet" href="materiais.css">
</head>

<body>

<div class="materiais-container">

  <div class="materiais-header">
    <h1>📂 Materiais da Aula</h1>
    <p>Organizados por disciplina e projeto</p>
  </div>

  <!-- 📑 ABAS -->
  <div class="tabs">
    <div class="tab active" data-tab="fisica">Física</div>
    <div class="tab" data-tab="matematica">Matemática</div>
    <div class="tab" data-tab="quimica">Química</div>
    <div class="tab" data-tab="interdisciplinar">Aprofundamento</div>
    <div class="tab" data-tab="letramento">Clube de Letramento</div>
    <div class="tab" data-tab="recomposicao">Recomposição</div>
    <div class="tab" data-tab="revisoes">Revisões</div>
  </div>

  <!-- 📄 CONTEÚDOS -->
  <div class="tab-content active" id="fisica"></div>
  <div class="tab-content" id="matematica"></div>
  <div class="tab-content" id="quimica"></div>
  <div class="tab-content" id="interdisciplinar"></div>
  <div class="tab-content" id="letramento"></div>
  <div class="tab-content" id="recomposicao"></div>
  <div class="tab-content" id="revisoes"></div>

</div>

<script src="materiais.js"></script>

</body>
</html>
