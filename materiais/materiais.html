<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Materiais • Portal do Professor Arlisson</title>

<link rel="stylesheet" href="materiais.css">
<link rel="stylesheet" href="../components/header-footer.css">
</head>

<body>

<!-- 🔷 HEADER GLOBAL -->
<div id="superheader"></div>

<!-- 📦 CONTEÚDO PRINCIPAL -->
<div class="materiais-container">

  <div class="materiais-header">
    <h1>📂 Materiais da Aula</h1>
    <p>Organizados por disciplina e projeto</p>
  </div>

  <!-- 📑 ABAS -->
  <div class="tabs">
    <button class="tab active" data-tab="fisica">⚛️ Física</button>
    <button class="tab" data-tab="matematica">📐 Matemática</button>
    <button class="tab" data-tab="quimica">🧪 Química</button>
    <button class="tab" data-tab="interdisciplinar">🧠 Aprofundamento</button>
    <button class="tab" data-tab="letramento">📖 Letramento</button>
    <button class="tab" data-tab="recomposicao">🔄 Recomposição</button>
    <button class="tab" data-tab="revisoes">📝 Revisões</button>
  </div>

  <!-- 📄 CONTEÚDOS -->
  <section class="tab-content active" id="fisica"></section>
  <section class="tab-content" id="matematica"></section>
  <section class="tab-content" id="quimica"></section>
  <section class="tab-content" id="interdisciplinar"></section>
  <section class="tab-content" id="letramento"></section>
  <section class="tab-content" id="recomposicao"></section>
  <section class="tab-content" id="revisoes"></section>

</div>

<!-- 🔻 FOOTER GLOBAL -->
<div id="superfooter"></div>


<script type="module">
  import { iniciarSuperHeader } from "../components/superheader.js";
  window.iniciarSuperHeader = iniciarSuperHeader;
</script>
<script src="materiais.js"></script>

</body>
</html>
